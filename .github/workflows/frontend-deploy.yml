name: "Frontend Deploy - S3"

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Select target environment"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - production

permissions:
  contents: read

env:
  AWS_REGION: "ap-southeast-1"

jobs:
  # =========================
  # STAGE 1: BUILD
  # =========================
  build:
    name: "1. Build Frontend"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Node"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "Install Dependencies"
        run: npm install

      - name: "Build Project"
        run: npm run build

      - name: "Upload Build Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 1

  # =========================
  # STAGE 2: DEPLOY
  # =========================
  deploy:
    name: "2. Deploy to S3"
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    # ✅ dynamic environment (this enables correct approval per env)
    environment: ${{ github.event.inputs.environment }}

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_UNBOUNDSHARE }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_UNBOUNDSHARE }}

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Download Build Artifact"
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_UNBOUNDSHARE }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_UNBOUNDSHARE }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ optional: different bucket per env (recommended)
      - name: "Set S3 bucket by environment"
        run: |
          if [ "${{ github.event.inputs.environment }}" = "production" ]; then
            echo "S3_BUCKET=unboundshare-frontend-prod" >> $GITHUB_ENV
          else
            echo "S3_BUCKET=unboundshare-frontend-qa" >> $GITHUB_ENV
          fi

      - name: "Deploy to S3"
        run: |
          aws s3 sync dist/ s3://$S3_BUCKET --delete