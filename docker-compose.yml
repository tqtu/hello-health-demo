services:
  health-example:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: health-hello-demo-container
    ports:
      # Map port 8080 on your Mac to port 3000 inside the container
      - "8080:3000"
    restart: unless-stopped
    # Environment variables (if any)
    environment:
      - NODE_ENV=production